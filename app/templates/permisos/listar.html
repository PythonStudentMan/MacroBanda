{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Permisos</h3>
  <a href="{{ url_for('permisos.crear') }}" class="btn btn-primary"> Nuevo Permiso</a>
</div>

<table class="table table-hover align-middle">
  <thead class="table-light">
    <tr>
      <th>Código</th>
      <th>Nombre</th>
      <th class="text-end">Acciones</th>
    </tr>
  </thead>
  <tbody>
    {% for p in permisos %}
    <tr>
      <td>{{ p.codigo }}</td>
      <td>{{ p.nombre }}</td>
      <td class="text-end">
        <a href="{{ url_for('permisos.editar', permiso_id=p.id) }}" class="btn btn-sm btn-warning">Editar</a>
        <a href="{{ url_for('permisos.eliminar', permiso_id=p.id) }}" class="btn btn-sm btn-danger">Eliminar</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
