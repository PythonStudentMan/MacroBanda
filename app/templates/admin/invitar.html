{% extends 'base_auth.html' %}
{% block content %}
<h3> Invitar a {{ agrupacion.nombre }}</h3>

<form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="email" name="email" class="form-control mb-2">
  <button class="btn btn-primary">Invitar</button>
</form>
{% endblock %}
