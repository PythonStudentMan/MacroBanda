{% extends 'base_tenant.html' %}
{% block content %}

<h3 class="mb-4">Socios</h3>

<div class="d-flex justify-content-between mb-3">
    <div></div>
    <a href="{{ url_for('socios.crear_socio') }}" class="btn btn-primary">
        Nuevo Socio
    </a>
</div>

<table class="table table-hover">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for s in socios %}
        <tr>
            <td>{{ s.nombre }} {{ s.apellidos }}</td>
            <td>{{ s.tipo_socio.nombre }}</td>
            <td>{{ s.email }}</td>
            <td>{{ s.telefono }}</td>
            <td class="text-end">
                <a href="{{ url_for('socios.editar_socio', id=s.id) }}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-pencil me-2"></i>Editar
                </a>
                <a href="{{ url_for('socios.baja_socio', id=s.id) }}" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash me-2"></i>Baja
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
