<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin MacroBanda</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

    <div class="d-flex">
        <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
            <h4>Admin</h4>
            <hr>
            <a href="{{ url_for('admin.dashboard') }}" class="text-white d-block mb-2">
                Dashboard
            </a>
            <a href="{{ url_for('admin.listar_agrupaciones') }}" class="text-white d-block mb-2">
                Agrupaciones
            </a>
        </div>

        <div class="p-4 flex-grow-1">
            <div class="d-flex justify-content-end mb-3">
                {{ current_user.email }}
                <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-outline-danger ms-3">Salir</a>
            </div>

            {% block content %}{% endblock %}

        </div>

    </div>

</body>
</html>
