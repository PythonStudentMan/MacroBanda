{% extends 'base_tenant.html' %}
{% block content %}

<h3 class="mb-4">
  {% if tipo %}Editar Tipo de Socio{% else %}Nuevo Tipo de Socio{% endif %}
</h3>

<form method="POST">

  <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input type="text" name="nombre" class="form-control"
           value="{{ tipo.nombre if tipo else '' }}" required autofocus>
  </div>

  <div class="form-check mb-3">
    <input type="checkbox" name="tiene_cuota" class="form-check-input"
           id="tiene_cuota_checkbox"
           {% if tipo and tipo.tiene_cuota %}checked{% endif %}>
    <label class="form-check-label" for="tiene_cuota_checkbox">
      ¿Tiene cuota?
    </label>
  </div>

  <!-- Campos de cuota solo visibles si tiene_cuota=True -->
  <div id="cuota-fields"
       style="display: {% if tipo and tipo.tiene_cuota %}block{% else %}none{% endif %};">

    <div class="mb-3">
      <label class="form-label">Importe (€)</label>
      <input type="number" step="0.01" name="importe" class="form-control"
             value="{{ tipo.configuracion_cuota.importe if tipo and tipo.configuracion_cuota else '' }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Frecuencia</label>
      <select name="frecuencia" class="form-select">
        <option value="unico">Pago Único</option>
        <option value="mensual">Mensual</option>
        <option value="bimensual">Bimensual</option>
        <option value="trimestral">Trimestral</option>
        <option value="cuatrimestral">Cuatrimestral</option>
        <option value="semestral">Semestral</option>
        <option value="anual">Anual</option>
        <option value="quincenal">Quincenal</option>
        <option value="semanal">Semanal</option>
      </select>
    </div>

  </div>

  <div class="d-flex justify-content-end">
    <button class="btn btn-primary">Guardar</button>
  </div>

</form>

<!-- Script para mostrar/ocultar campos de cuota según checkbox -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const checkbox = documento.getElementById("tiene_cuota_checkbox");
  const fields = documento.getElementById("cuota_fields");

  checkbox.addEventListener("change", function() {
    fields.style.display = this.checked ? "block" : "none";
  });
});
</script>

{% endblock %}
