{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Nuevo Rol</h3>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" required autofocus>
    </div>

    <div class="mb-3">
        <label class="form-label">Permisos</label>
        <div class="form-check">
            {% for p in permisos %}
            <input class="form-check-input" type="checkbox" name="permisos" value="{{ p.id }}" id="perm{{ p.id }}">
            <label class="form-check-label" for="perm{{ p.id }}">{{ p.nombre }}</label><br>
            {% endfor %}
        </div>
    </div>

    <div class="d-flex justify-content-end">
        <button class="btn btn-primary">Crear</button>
    </div>
</form>
{% endblock %}
