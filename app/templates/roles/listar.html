{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Roles</h3>
  <a href="{{ url_for('roles.crear') }}" class="btn btn-primary"> Nuevo Rol</a>
</div>

<table class="table table-hover align-middle">
  <thead class="table-light">
    <tr>
      <th>Nombre</th>
      <th>Permisos</th>
      <th class="text-end">Acciones</th>
    </tr>
  </thead>
  <tbody>
    {% for r in roles %}
    <tr>
      <td>{{ r.nombre }}</td>
      <td>
        {% for p in r.permisos %}
          <span class="badge bg-secondary">{{ p.nombre }}</span>
        {% endfor %}
      </td>
      <td class="text-end">
        <a href="{{ url_for('usuarios.editar', rol_id=r.id) }}" class="btn btn-sm btn-warning">Editar</a>
        <a href="{{ url_for('usuarios.eliminar', rol_id=r.id) }}" class="btn btn-sm btn-danger">Eliminar</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
