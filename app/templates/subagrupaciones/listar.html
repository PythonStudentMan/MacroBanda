{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Secciones</h3>
  <a href="{{ url_for('subagrupaciones.crear') }}" class="btn btn-primary"> Nueva</a>
</div>

<table class="table table-hover align-middle">
  <thead class="table-light">
    <tr>
      <th>Nombre</th>
      <th>Agrupación</th>
      <th class="text-end">Acciones</th>
    </tr>
  </thead>
  <tbody>
    {% for s in subagrupaciones %}
    <tr>
      <td>{{ s.nombre }}</td>
      <td>{{ s.agrupacion.nombre }}</td>
      <td class="text-end">
        <a href="{{ url_for('subagrupaciones.editar', subagrupacion_id=s.id) }}" class="btn btn-sm btn-warning">Editar</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
